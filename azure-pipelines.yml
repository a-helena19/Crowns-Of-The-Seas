trigger:
  branches:
    include:
      - master
  tags:
    include:
      - 'v*'

pr: none

pool:
  name: 'EA-Projekt-Server-Agent'

variables:
  backendImage: 'eateam6-backend'
  frontendImage: 'eateam6-frontend'
  ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
    tag: ${{ replace(variables['Build.SourceBranch'], 'refs/tags/', '') }}
  ${{ else }}:
    tag: '$(Build.BuildId)'

stages:
  - stage: Test
    displayName: 'Test'
    jobs:
      - job: TestBackend
        displayName: 'Backend Tests'
        steps:
          # VORAB-RETTUNG: Falls noch alte Root-Leichen da sind, räumt dieser Schritt sie als root weg
          - script: |
              docker run --rm -v "$(Build.SourcesDirectory)/backend":/app -w /app eclipse-temurin:17-jdk bash -c "rm -rf .gradle build"
            displayName: 'Emergency Cleanup old root files'
            continueOnError: true

          # SAUBERER TEST-RUN: Läuft als 'student' und ignoriert Fehlschläge beim Deployment
          - script: |
              docker run --rm \
                --user "$(id -u):$(id -g)" \
                -v "$(Build.SourcesDirectory)/backend":/app \
                -w /app \
                eclipse-temurin:17-jdk \
                bash -c "chmod +x ./gradlew && ./gradlew test -g /tmp/.gradlehome --project-cache-dir /tmp/.gradle"
            displayName: 'Run Backend Tests'
            continueOnError: true  # <--- Bleibt drin, Pipeline läuft bei Test-Fehlern weiter

      - job: TestFrontend
        displayName: 'Frontend Build Check'
        steps:
          # AUCH HIER: User-ID mitgeben, damit node_modules als 'student' angelegt wird
          - script: |
              docker run --rm \
                --user "$(id -u):$(id -g)" \
                -v "$(Build.SourcesDirectory)/frontend":/app \
                -w /app \
                node:24-alpine \
                sh -c "npm install && npm run build"
            displayName: 'Build Frontend'

  - stage: Build
    displayName: 'Build Docker Images'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildImages
        displayName: 'Build Images'
        steps:
          - script: |
              docker build -t $(backendImage):$(tag) -t $(backendImage):latest ./backend
            displayName: 'Build Backend Image'

          - script: |
              docker build -t $(frontendImage):$(tag) -t $(frontendImage):latest ./frontend
            displayName: 'Build Frontend Image'

  - stage: Deploy
    displayName: 'Deploy Application'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployApp
        displayName: 'Deploy with Docker Compose'
        steps:
          - script: |
              docker-compose down
              docker-compose --profile app up -d
            displayName: 'Deploy with Docker Compose'