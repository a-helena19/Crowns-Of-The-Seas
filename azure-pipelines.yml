trigger:
  branches:
    include:
      - master
  tags:
    include:
      - 'v*'

pr: none

pool:
  name: 'EA-Projekt-Server-Agent'

variables:
  backendImage: 'eateam6-backend'
  frontendImage: 'eateam6-frontend'
  ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
    tag: ${{ replace(variables['Build.SourceBranch'], 'refs/tags/', '') }}
  ${{ else }}:
    tag: '$(Build.BuildId)'

stages:
  - stage: Test
    displayName: 'Test'
    jobs:
      - job: TestBackend
        displayName: 'Backend Tests'
        steps:
          - script: |
              docker run --rm -v "$(Build.SourcesDirectory)/backend":/app -w /app eclipse-temurin:17-jdk bash -c "chmod +x ./gradlew && ./gradlew test"
            displayName: 'Run Backend Tests'

      - job: TestFrontend
        displayName: 'Frontend Build Check'
        steps:
          - script: |
              docker run --rm -v "$(Build.SourcesDirectory)/frontend":/app -w /app node:20-alpine sh -c "npm ci && npm run build"
            displayName: 'Build Frontend'

  - stage: Build
    displayName: 'Build Docker Images'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildImages
        displayName: 'Build Images'
        steps:
          - script: |
              docker build -t $(backendImage):$(tag) -t $(backendImage):latest ./backend
            displayName: 'Build Backend Image'

          - script: |
              docker build -t $(frontendImage):$(tag) -t $(frontendImage):latest ./frontend
            displayName: 'Build Frontend Image'

  - stage: Deploy
    displayName: 'Deploy Application'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployApp
        displayName: 'Deploy with Docker Compose'
        steps:
          - script: |
              docker-compose down
              docker-compose up -d
            displayName: 'Deploy with Docker Compose'
